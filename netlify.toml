# Netlify — zero-config deployment for INFOTECH INTERNET SERVICES SPA

[build]
  command   = "npx vite build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for every client-side route
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
